// Open-Connect machine-message contracts (arc42 §5.4.4).
//
// This package is the SINGLE SOURCE OF TRUTH for every message that crosses
// the device <-> control-plane boundary on NATS. Both Go and Rust bindings
// are generated from this file via `buf generate`. Hand-written serialisation
// is not permitted (ADR-0007).
//
// Compatibility rules (enforced by `buf breaking` in CI):
//   - Field numbers are immutable; never reuse, never change types in place.
//   - Deprecated fields move to `reserved`.
//   - Additions only.

syntax = "proto3";

package otap.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/FabianSchurig/open-connect/gen/go/otap/v1;otapv1";

// AgentState — §5.7.1 agent state machine.
enum AgentState {
  AGENT_STATE_UNSPECIFIED  = 0;
  AGENT_STATE_IDLE         = 1;
  AGENT_STATE_POLLING      = 2;
  AGENT_STATE_VERIFYING    = 3;
  AGENT_STATE_EXECUTING    = 4;
  AGENT_STATE_REBOOTING    = 5;
  AGENT_STATE_VALIDATING   = 6;
  AGENT_STATE_ROLLING_BACK = 7;
  AGENT_STATE_PREPARING    = 8;
  AGENT_STATE_READY        = 9;
  AGENT_STATE_IN_USE       = 10;
}

// Device — registered fleet member.
message Device {
  string serial                              = 1;
  repeated string tags                       = 2;
  string public_key                          = 3; // device Ed25519 pubkey (PEM)
  string nats_nkey                           = 4; // optional in MVP (mTLS-only mode)
  string agent_version                       = 5;
  string active_partition                    = 6;
  google.protobuf.Timestamp last_heartbeat   = 7;
}

// Heartbeat — published periodically by every agent on
// `device.<serial>.heartbeat`.
message Heartbeat {
  string serial                              = 1;
  string agent_version                       = 2;
  AgentState state                           = 3;
  string active_partition                    = 4;
  string current_deployment_id               = 5;
  google.protobuf.Timestamp at               = 6;
  string current_deployed_version            = 7; // semver; consulted by anti-rollback gate
}

// Telemetry — opaque OTLP envelope (see §8.2 / FR-18). Carried on
// `device.<serial>.telemetry` (JetStream).
message Telemetry {
  string serial                              = 1;
  google.protobuf.Timestamp at               = 2;
  bytes  otlp_payload                        = 3;
  string agent_version                       = 4;
  string current_deployment_id               = 5;
}

// StepResult — per-step report from the config-driven engine (FR-21).
message StepResult {
  string deployment_id                       = 1;
  string step_id                             = 2;
  uint32 step_index                          = 3;
  string primitive                           = 4;
  bool   success                             = 5;
  int32  exit_code                           = 6;
  string stdout_truncated                    = 7;
  string stderr_truncated                    = 8;
  bool   stdout_truncated_marker             = 9;
  bool   stderr_truncated_marker             = 10;
  google.protobuf.Duration duration          = 11;
  google.protobuf.Timestamp at               = 12;
  string serial                              = 13;
}

// DeploymentAck — cryptographic ack of a fully-applied manifest (FR-11).
message DeploymentAck {
  string deployment_id                       = 1;
  string device_serial                       = 2;
  string manifest_hash                       = 3; // SHA-256(BASE64URL(JCS(payload)))
  string deployed_version                    = 4;
  google.protobuf.Timestamp at               = 5;
  bytes  agent_signature                     = 6; // Ed25519 over canonicalised tuple
}

// DesiredStateEnvelope — the JWS-compact-serialised manifest carried
// alongside its decoded canonical hash. The agent verifies `jws_compact`
// before consuming the payload (§5.8 verification rules).
message DesiredStateEnvelope {
  string jws_compact                         = 1; // RFC 7515 compact form
  string deployment_id                       = 2; // mirror for routing/dedup
  google.protobuf.Timestamp issued_at        = 3;
}

// Claim messages — see arc42 §5.7.2 + UC-03.

message ClaimRequest {
  string claim_id                            = 1;
  uint32 count                               = 2;
  repeated string required_tags              = 3;
  string desired_version                     = 4;
  uint32 ttl_seconds                         = 5;
  uint32 preparation_timeout_seconds         = 6;
  string requested_by                        = 7;
}

message ClaimOffer {
  string claim_id                            = 1;
  repeated string required_tags              = 2;
  string desired_version                     = 3;
  uint32 slots_remaining                     = 4;
  google.protobuf.Timestamp expires_at       = 5;
}

message ClaimLock {
  string claim_id                            = 1;
  string serial                              = 2;
  uint64 attempt_id                          = 3;
}

message ClaimLockReply {
  bool   granted                             = 1;
  string lease_id                            = 2;
  uint32 preparation_timeout_seconds         = 3;
  string reason                              = 4; // populated when !granted
}

message ClaimRelease {
  string claim_id                            = 1;
  string lease_id                            = 2;
}
