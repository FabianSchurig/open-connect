version: v2
clean: true
plugins:
  # Go bindings — committed under gen/go/, imported by services/control-plane/.
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/FabianSchurig/open-connect/gen/go
